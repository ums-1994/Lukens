services:
  # Backend API Service
  - type: web
    name: lukens-backend
    env: python
    region: oregon
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python migrate_db.py && python seed_content_blocks.py && gunicorn -c gunicorn_conf.py app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_HOST
        fromDatabase:
          name: lukens-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lukens-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: lukens-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: lukens-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lukens-db
          property: password
      # Prefer a full connection string in production. This avoids hostname/DNS
      # issues when only an internal host is provided.
      - key: DATABASE_URL
        fromDatabase:
          name: lukens-db
          property: connectionString
      # AI assistant: async jobs free the Gunicorn worker during long HF calls; pair with WEB_CONCURRENCY=1 on small plans.
      - key: AI_ASSISTANT_ASYNC_ENABLED
        value: "true"
      - key: AI_ASSISTANT_ASYNC_MAX_WORKERS
        value: "1"
      # One sync worker avoids duplicate Python heaps on small instances (see backend/gunicorn_conf.py WORKERS).
      - key: WORKERS
        value: "1"
      # Add your other environment variables in Render dashboard
      # OPENROUTER_API_KEY, CLOUDINARY_*, SENDGRID_*, DOCUSIGN_*, FIREBASE_*, etc.
      # FRONTEND_URL=https://sowbuilders.netlify.app (set in Render dashboard)

  # Frontend Static Site
  - type: web
    name: lukens-frontend
    env: static
    region: oregon
    plan: starter
    buildCommand: git clone https://github.com/flutter/flutter.git -b stable /tmp/flutter && export PATH="$PATH:/tmp/flutter/bin" && flutter config --enable-web && cd frontend_flutter && flutter pub get && flutter build web --release --base-href / --dart-define=RISK_GATE_HF_BASE_URL=$RISK_GATE_HF_BASE_URL
    staticPublishPath: frontend_flutter/build/web
    envVars:
      - key: REACT_APP_API_URL
        sync: false
        # Set this to your backend URL after deployment: https://lukens-backend.onrender.com
      - key: RISK_GATE_HF_BASE_URL
        sync: false
        # e.g. https://your-risk-gate.hf.space (no /analyze suffix). Required for client-side Risk Gate calls.

databases:
  # PostgreSQL Database
  - name: lukens-db
    databaseName: lukens_production
    user: lukens_user
    plan: starter
    region: oregon


<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <base href="$FLUTTER_BASE_HREF">
  <title>Proposal & SOW Builder v2</title>
  <!-- API mode selection (local API is opt-in) -->
  <script>
    // Local API is opt-in:
    // - append ?useLocalApi=true to URL, or
    // - set window.USE_LOCAL_API=true before app bootstrap.
    (function () {
      var existing = window.USE_LOCAL_API;
      var search = (window.location && window.location.search) ? window.location.search : '';
      var params = new URLSearchParams(search);
      var qp = params.get('useLocalApi');

      if (qp !== null) {
        window.USE_LOCAL_API = (qp === '1' || String(qp).toLowerCase() === 'true');
        return;
      }

      if (typeof existing === 'undefined') {
        window.USE_LOCAL_API = false;
      }
    })();
  </script>
  <!-- App Configuration - Load before Flutter app -->
  <script src="config.js"></script>
</head>
<body>
  <script src='flutter_bootstrap.js' async></script>
</body>
</html>
